# ============================================================
# LLM Failover Proxy — 配置
# 按 priority 升序依次尝试，失败自动切下一个
# ============================================================
#
# 【Jiuwen 配置参考】
# 在 Jiuwen config.yaml models.defaults 中填写：
#
#   model_client_config:
#     api_base: http://localhost:8000/v1    ← 指向本代理
#     api_key: default                      ← 代理不验证 key
#     model_name: local_route               ← 代理通过 model_map 映射到真实模型
#     client_provider: OpenAI
#
# 如果 Jiuwen 和代理不在同一台机器，把 localhost 换成代理所在机器的 IP。
# ============================================================

host: "0.0.0.0"
port: 8000
log_level: info
admin_key: "${PROXY_ADMIN_KEY:-admin123}"  # 管理面板认证（留空=不认证，建议修改；环境变量 PROXY_ADMIN_KEY 可覆盖）

# ── 熔断器配置 ──────────────────────────────────────────────
circuit_breaker:
  enabled: true
  failure_threshold: 3          # 连续失败 N 次后降级
  recovery_interval_seconds: 60 # 每 N 秒尝试恢复降级的 provider
  probe_path: "/v1/models"      # 探测请求路径（轻量，不消耗 token）

# ── 软触发阈值（思考模式兼容） ────────────────────────────
soft_trigger:
  enabled: true
  ttft_threshold_ms: 60000       # 首 chunk 等待 >60s 触发（思考模式首 token 可能延迟）
  tpot_threshold_ms: 10000        # 每 token 生成 >10s 触发（思考→内容过渡间隙）
  throughput_threshold_tokens_per_sec: 3   # 吞吐 <3 t/s 持续触发（推理稀疏期容忍）
  throughput_window_seconds: 20.0          # 20s 后开始检查吞吐（给思考模式留足时间）

providers:
  # ── Provider 示例，替换为你自己的 API Key ─────────────────
  - name: example-provider-0
    priority: 0
    api_base: "https://api.example.com/v1"
    api_key: "${API_KEY_0}"     # 替换为你的 API Key
    timeout: 180
    model_map:
      local_route: "your-model-0"

  - name: example-provider-1
    priority: 1
    api_base: "https://api.example.com/v1"
    api_key: "${API_KEY_1}"     # 替换为你的 API Key
    timeout: 120
    model_map:
      local_route: "your-model-1"
