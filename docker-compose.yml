services:
  llm-failover:
    build: .
    container_name: llm-failover-proxy
    restart: always
    ports:
      - "8000:8000"
    volumes:
      # 配置（只读，改 config.yaml 后 docker compose restart 生效）
      - ./config.yaml:/app/config.yaml:ro
      # 日志
      - ./logs:/app/logs
      # A2: 结果缓存 SQLite
      - ./data:/data
    environment:
      - PROXY_CONFIG=/app/config.yaml
      - PROXY_LOG_DIR=/app/logs
      - TZ=Asia/Shanghai
      # API Keys（优先用环境变量，免去修改 config.yaml）
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - VOLC_API_KEY=${VOLC_API_KEY:-}
      - GLM_API_KEY=${GLM_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
